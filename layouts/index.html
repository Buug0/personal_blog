{{ define "main" }}
  <article class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center mw8 lh-copy mid-gray">
    <!-- 这里显示 _index.md 里的建站说明 -->
    {{ .Content }}
  </article>

  <section class="w-100 mw8 center">
    <h2 class="f2 fw4 pa3 mb0 baskerville">最新动态</h2>
    
    <!-- 核心逻辑：从 posts 和 memos 中找，按时间排序，只取前 5 条 -->
    {{ $pages := (where .Site.RegularPages "Section" "in" (slice "posts" "memos")) }}
    {{ range first 5 $pages }}
      <div class="relative w-100 mb4">
        {{ .Render "summary-with-image" }}
      </div>
    {{ end }}

    <!-- 提供一个查看更多的链接 -->
    <section class="pa3 tr">
      <a href="/posts/" class="f6 link dim br1 ph3 pv2 mb2 dib white bg-black">查看更多文章</a>
      <a href="/memos/" class="f6 link dim br1 ph3 pv2 mb2 dib white bg-near-black">查看所有碎碎念</a>
    </section>
  </section>
{{ end }}
