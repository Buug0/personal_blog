h4-ns"><h1 class="f2 f-subheadline-l fw2 white-90 mb0 lh-title">Buug长文</h1></div></div></header><main class=pb7 role=main><article class="pa3 pa4-ns nested-copy-line-height"><section class="cf ph3 ph5-l pv3 pv4-l f4 tc-l center measure-wide lh-copy nested-links mid-gray"><p>长篇话想说</p></section><section class="flex-ns mt5 flex-wrap justify-around"><div class="w-100 w-30-l mb4 relative bg-white"><div class="w-100 mb4 nested-copy-line-height relative bg-white"><div class="mb3 pa4 gray overflow-hidden bg-white"><span class="f6 db">Buug长文</span><h1 class="f3 near-black"><a href=/posts/%E7%BD%91%E7%AB%99%E8%AE%BE%E7%AB%8B%E5%8E%9F%E5%9B%A0/ class="link black dim">网站设立原因</a></h1><div class="nested-links f5 lh-copy nested-copy-line-height"><p>保研季想查找前几年相同背景的学长的经历，发现无处可查。于是决定开始写blog，想分享个人经历，以供其他人借鉴。</p><p>在建立网站当天，和明日への槍聊天，发现他在科研实习时遇到的部分问题我也碰到过。受限于交流不够的原因，在实习期后，我俩如今才知道这个事情。也算给网站增加了一些建立动机，可以分享技术问题和解决的方案。</p></div><a href=/posts/%E7%BD%91%E7%AB%99%E8%AE%BE%E7%AB%8B%E5%8E%9F%E5%9B%A0/ class="ba b--moon-gray bg-light-gray br2 color-inherit dib f7 hover-bg-moon-gray link mt2 ph2 pv1">read more</a></div></div></div></section></article></main><footer class="bg-black bottom-0 w-100 pa3" role=contentinfo><div class="flex justify-between"><a class="f4 fw4 hover-white white-70 dn dib-ns pv2 ph3 no-underline" href=/>&copy; Buug 2026</a><div><div class=ananke-socials></div></div></div></footer></body></html>
