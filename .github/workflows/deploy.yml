name: Deploy Hugo to GitHub Pages

on:
  push:
    branches:
      - main  # 确保这是你的主分支名

# 允许脚本拥有发布 Pages 的权限
permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        # 注意：这里强制注入你的 GitHub URL，防止样式错乱
        run: hugo --minify --baseURL "https://buug0.github.io/buug_blog.github.io/"

      - name: Upload artifact
        # 这是触发 pages-build-deployment 的关键动作
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4